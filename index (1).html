<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Tracker</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --text: #1a1a19;
    --text-muted: #6b6a66;
    --card-bg: #f5f4f1;
    --border: #ddd9d0;
    --input-bg: #ffffff;
    --hover-bg: #ececea;
    --accent: #3b6d11;
    --accent-bg: #e8f0db;
    --cell-empty: #ececea;
    --lvl1: #C0DD97;
    --lvl2: #97C459;
    --lvl3: #639922;
    --lvl4: #27500A;
  }

  [data-theme="dark"] {
    --bg: #0d0d0d;
    --text: #e8e8e3;
    --text-muted: #898781;
    --card-bg: #151514;
    --border: #2c2c2a;
    --input-bg: #1a1a19;
    --hover-bg: #242422;
    --accent: #97C459;
    --accent-bg: #1a2e22;
    --cell-empty: #1a1a19;
    --lvl1: #C0DD97;
    --lvl2: #97C459;
    --lvl3: #639922;
    --lvl4: #27500A;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
    transition: background 0.2s, color 0.2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0;
  }
  input, select, button {
    font-family: inherit;
    font-size: 14px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    padding: 8px 12px;
  }
  input:focus, select:focus { outline: none; border-color: var(--lvl3); }
  button {
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--hover-bg); }
  button:active { transform: scale(0.98); }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 24px;
  }
  #theme-toggle {
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .muted { color: var(--text-muted); font-size: 13px; }
  .card {
    background: var(--card-bg); border-radius: 12px; border: 0.5px solid var(--border);
    padding: 20px; margin-bottom: 20px;
  }
  .heatmap-wrap { overflow-x: auto; }
  .legend { display: flex; gap: 8px; align-items: center; justify-content: flex-end;
    margin: 8px 0 20px; font-size: 12px; color: var(--text-muted); }
  .legend-box { display: flex; gap: 3px; }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; }
  .focus-card { text-align: center; }
  .clock { font-family: 'SF Mono', Consolas, monospace; font-size: 40px; font-weight: 500; color: var(--accent); }
  .row { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ranking-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: 8px; background: var(--input-bg); margin-bottom: 8px;
  }
  .ranking-row.me { background: var(--accent-bg); }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent-bg); color: var(--accent); padding: 10px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <h1>Study tracker</h1>
    <button id="theme-toggle" aria-label="Cambiar tema" title="Cambiar entre modo claro y oscuro">
      <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
  </div>

  <div class="top-row">
    <div class="row">
      <input type="text" id="username" placeholder="Tu nombre" style="width:160px;" />
    </div>
    <div class="muted" id="year-total"></div>
  </div>

  <div class="card">
    <div class="heatmap-wrap"><div id="heatmap" style="min-width:760px;"></div></div>
    <div class="legend">
      <span>Menos</span>
      <div class="legend-box">
        <span class="legend-cell" style="background:var(--cell-empty);border:0.5px solid var(--border);"></span>
        <span class="legend-cell" style="background:var(--lvl1);"></span>
        <span class="legend-cell" style="background:var(--lvl2);"></span>
        <span class="legend-cell" style="background:var(--lvl3);"></span>
        <span class="legend-cell" style="background:var(--lvl4);"></span>
      </div>
      <span>Más</span>
    </div>
  </div>

  <div class="card focus-card">
    <p class="muted" style="margin:0 0 14px;">Sesión de concentración — hoy</p>

    <div id="focus-idle" style="display:flex; flex-direction:column; align-items:center; gap:12px;">
      <div class="row">
        <label class="muted">Duración</label>
        <select id="focus-minutes">
          <option value="15">15 min</option>
          <option value="25" selected>25 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
      </div>
      <button id="start-focus">Iniciar sesión</button>
    </div>

    <div id="focus-running" style="display:none; flex-direction:column; align-items:center; gap:12px;">
      <div class="clock" id="focus-clock">25:00</div>
      <p class="muted" style="margin:0;">Si cancelas antes de tiempo, no se guarda.</p>
      <button id="cancel-focus">Cancelar</button>
    </div>

    <div id="focus-done" style="display:none; flex-direction:column; align-items:center; gap:8px;">
      <p style="margin:0; color:var(--accent);">Sesión completada y guardada</p>
    </div>
  </div>

  <div class="card">
    <div class="top-row" style="margin-bottom:14px;">
      <p style="font-weight:500; margin:0;">Ranking</p>
      <button id="refresh-ranking">Actualizar</button>
    </div>
    <div id="ranking-list"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
