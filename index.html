<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d0d;
    color: #e8e8e3;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  input, select, button {
    font-family: inherit;
    font-size: 14px;
    border-radius: 8px;
    border: 0.5px solid #3a3a38;
    background: #1a1a19;
    color: #e8e8e3;
    padding: 8px 12px;
  }
  input:focus, select:focus { outline: none; border-color: #639922; }
  button {
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #242422; }
  button:active { transform: scale(0.98); }
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .muted { color: #898781; font-size: 13px; }
  .card {
    background: #151514; border-radius: 12px; border: 0.5px solid #2c2c2a;
    padding: 20px; margin-bottom: 20px;
  }
  .heatmap-wrap { overflow-x: auto; }
  .legend { display: flex; gap: 8px; align-items: center; justify-content: flex-end;
    margin: 8px 0 20px; font-size: 12px; color: #898781; }
  .legend-box { display: flex; gap: 3px; }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; }
  .focus-card { text-align: center; }
  .clock { font-family: 'SF Mono', Consolas, monospace; font-size: 40px; font-weight: 500; color: #5DCAA5; }
  .row { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ranking-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: 8px; background: #1a1a19; margin-bottom: 8px;
  }
  .ranking-row.me { background: #1a2e22; }
  .day-cell { cursor: default; }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a2e22; color: #97C459; padding: 10px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 Study Tracker</h1>

  <div class="top-row">
    <div class="row">
      <input type="text" id="username" placeholder="Tu nombre" style="width:160px;" />
    </div>
    <div class="muted" id="year-total"></div>
  </div>

  <div class="card">
    <div class="heatmap-wrap"><div id="heatmap" style="min-width:760px;"></div></div>
    <div class="legend">
      <span>Menos</span>
      <div class="legend-box">
        <span class="legend-cell" style="background:#1a1a19;border:0.5px solid #3a3a38;"></span>
        <span class="legend-cell" style="background:#C0DD97;"></span>
        <span class="legend-cell" style="background:#97C459;"></span>
        <span class="legend-cell" style="background:#639922;"></span>
        <span class="legend-cell" style="background:#27500A;"></span>
      </div>
      <span>Más</span>
    </div>
  </div>

  <div class="card focus-card">
    <p class="muted" style="margin:0 0 14px;">Sesión de concentración — hoy</p>

    <div id="focus-idle" style="display:flex; flex-direction:column; align-items:center; gap:12px;">
      <div class="row">
        <label class="muted">Duración</label>
        <select id="focus-minutes">
          <option value="15">15 min</option>
          <option value="25" selected>25 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
      </div>
      <button id="start-focus">▶ Iniciar sesión</button>
    </div>

    <div id="focus-running" style="display:none; flex-direction:column; align-items:center; gap:12px;">
      <div class="clock" id="focus-clock">25:00</div>
      <p class="muted" style="margin:0;">Si cancelas antes de tiempo, no se guarda.</p>
      <button id="cancel-focus">✕ Cancelar</button>
    </div>

    <div id="focus-done" style="display:none; flex-direction:column; align-items:center; gap:8px;">
      <p style="margin:0; color:#5DCAA5;">✓ Sesión completada y guardada</p>
    </div>

    <div class="row" style="margin-top:18px; border-top:0.5px solid #2c2c2a; padding-top:14px;">
      <label class="muted">O agrega tiempo manual (min)</label>
      <input type="number" id="manual-minutes" min="1" max="720" step="5" style="width:80px;" placeholder="30" />
      <button id="add-manual">Agregar</button>
    </div>
  </div>

  <div class="card">
    <div class="top-row" style="margin-bottom:14px;">
      <p style="font-weight:500; margin:0;">🏆 Ranking</p>
      <button id="refresh-ranking">↻ Actualizar</button>
    </div>
    <div id="ranking-list"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
